services:
  web:
    image: ghcr.io/pauljoda/obscura-web:latest
    ports:
      - "8008:8008"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:4000
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/pauljoda/obscura-api:latest
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://obscura:obscura@postgres:5432/obscura
      - REDIS_URL=redis://redis:6379
      - OBSCURA_CACHE_DIR=/data/cache
    depends_on:
      - postgres
      - redis
    volumes:
      - cache-data:/data/cache
      - media-data:/media
    restart: unless-stopped

  worker:
    image: ghcr.io/pauljoda/obscura-worker:latest
    environment:
      - DATABASE_URL=postgresql://obscura:obscura@postgres:5432/obscura
      - REDIS_URL=redis://redis:6379
      - OBSCURA_CACHE_DIR=/data/cache
    depends_on:
      - postgres
      - redis
    volumes:
      - cache-data:/data/cache
      - media-data:/media
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: obscura
      POSTGRES_USER: obscura
      POSTGRES_PASSWORD: obscura
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres-data:
  cache-data:
  media-data:
