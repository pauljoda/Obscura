<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af74"/>
      <stop offset="100%" stop-color="#8c6c32"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d1017"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5" fill="none" stroke="#c79b5c" stroke-opacity="0.2"/>

  <!-- Outer lens ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#b)" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Aperture blades — simplified 6 blades -->
  <polygon points="16,5 18.5,11 16,10 13.5,11" fill="url(#b)" opacity="0.85"/>
  <polygon points="25.5,10.5 22.5,14.5 21,12.5 22,10.5" fill="url(#b)" opacity="0.7"/>
  <polygon points="26.5,21 22.5,21.5 21,19.5 22.5,17.5" fill="url(#b)" opacity="0.6"/>
  <polygon points="16,27 13.5,21 16,22 18.5,21" fill="url(#b)" opacity="0.85"/>
  <polygon points="6.5,21.5 9.5,17.5 11,19.5 10,21.5" fill="url(#b)" opacity="0.7"/>
  <polygon points="5.5,11 9.5,10.5 11,12.5 9.5,14.5" fill="url(#b)" opacity="0.6"/>

  <!-- Center hole -->
  <circle cx="16" cy="16" r="4" fill="#08090c"/>
  <circle cx="16" cy="16" r="4" fill="none" stroke="#c79b5c" stroke-width="0.75" stroke-opacity="0.35"/>
</svg>
