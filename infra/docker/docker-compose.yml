services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    command: pnpm --filter @obscura/web dev
    env_file:
      - ../../.env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    command: pnpm --filter @obscura/api dev
    env_file:
      - ../../.env.example
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    command: pnpm --filter @obscura/worker dev
    env_file:
      - ../../.env.example
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: obscura
      POSTGRES_USER: obscura
      POSTGRES_PASSWORD: obscura
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:

