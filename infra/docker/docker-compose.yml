services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    command: pnpm --filter @obscura/web dev
    env_file:
      - ../../.env.example
    ports:
      - "8008:8008"
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    command: pnpm --filter @obscura/api dev
    env_file:
      - ../../.env.example
    environment:
      OBSCURA_CACHE_DIR: /data/cache
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    volumes:
      - cache-data:/data/cache

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    command: pnpm --filter @obscura/worker dev
    env_file:
      - ../../.env.example
    environment:
      OBSCURA_CACHE_DIR: /data/cache
    depends_on:
      - postgres
      - redis
    volumes:
      - cache-data:/data/cache

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: obscura
      POSTGRES_USER: obscura
      POSTGRES_PASSWORD: obscura
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  postgres-data:
  cache-data:
