worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    # Allow large video uploads (must be >= OBSCURA_MAX_VIDEO_UPLOAD, default 20 GiB)
    client_max_body_size 21g;

    # Upstream: Fastify API
    upstream api {
        server 127.0.0.1:4000;
    }

    # Upstream: Next.js web
    upstream web {
        server 127.0.0.1:3000;
    }

    server {
        listen 8008;
        server_name _;

        # Static assets served by the API (thumbnails, waveforms, covers, HLS, etc.)
        location /assets/ {
            proxy_pass http://api/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            # Long-running asset ops (HLS segment transcodes on first hit,
            # large waveform renders) occasionally need more than the
            # default 60s.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # API requests — strip /api prefix and forward to Fastify
        location /api/ {
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            # Plugin cascade accepts can take a while — each selected image
            # is downloaded from TMDB (poster/backdrop/logo on the series,
            # a poster per season, plus cast/guest-star headshots). Raise
            # the default 60s so slow external fetches don't surface as a
            # 504 to the user.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Everything else goes to Next.js
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
